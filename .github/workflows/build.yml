name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kode
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download gradle-wrapper.jar
      run: |
        mkdir -p gradle/wrapper
        curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
          -o gradle/wrapper/gradle-wrapper.jar
        echo "gradle-wrapper.jar size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission untuk gradlew
      run: chmod +x gradlew

    - name: Build APK (Debug)
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KendoAssistant-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build info
      run: |
        echo "✅ APK berhasil dibuild!"
        ls -lh app/build/outputs/apk/debug/app-debug.apk
